# /etc/nginx/sites-available/kb-api.keyflo.ai
# Proxy to learning-kb-api on localhost. TLS handled by Cloudflare (Full or Flexible).

server {
    listen 80;
    server_name kb-api.keyflo.ai;

    location /health {
        proxy_pass http://127.0.0.1:8791/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8791/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
        client_max_body_size 32k;
    }

    location / {
        return 404;
    }
}
