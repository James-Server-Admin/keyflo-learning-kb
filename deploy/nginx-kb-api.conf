# /etc/nginx/sites-available/kb-api.keyflo.ai
# Proxy to learning-kb-api on localhost.
# Cloudflare Full SSL → origin connects on 443; port 80 kept for direct HTTP checks.

server {
    listen 80;
    listen [::]:80;
    server_name kb-api.keyflo.ai;

    location /health {
        proxy_pass http://127.0.0.1:8791/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8791/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
        client_max_body_size 32k;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name kb-api.keyflo.ai;

    ssl_certificate     /etc/ssl/cloudflare/keyflo.ai.pem;
    ssl_certificate_key /etc/ssl/cloudflare/keyflo.ai.key;

    location /health {
        proxy_pass http://127.0.0.1:8791/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8791/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
        client_max_body_size 32k;
    }

    location / {
        return 404;
    }
}
